name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt -r requirements-dev.txt
      - name: Unit tests
        run: python -m pytest -q
      - name: Eval (snapshot + synthetic corrections)
        run: python -m app.eval
      - name: Eval self-test — injected bad rule must be caught
        run: "! python -m app.eval --inject-bad-rule"

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  prod-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backend image
        run: docker build -t reconops-backend ./backend
      - name: Edge image (frontend build + Caddy)
        run: docker build -t reconops-edge -f deploy/Dockerfile.edge .
